// yquake2 5.11 — per-machine autoexec for imac-g5
//   PowerMac8,2 (2004) — iMac G5 17" ALS, PPC 970FX @ 2.0 GHz, AltiVec,
//   ATI Radeon 9600 (RV351) 128 MB VRAM AGP, 1 GB RAM, native 1440x900,
//   Mac OS X 10.5.8 Leopard (9L31a).
//   Fat binary slice: ppc970 (-mcpu=970, distinct Mach-O subtype so dyld
//   prefers it over the ppc7400 slice on a G5).
//
// Design rationale
// ----------------
// The MOST capable PowerPC box in the fleet. Two clear steps up from the
// previous PPC leader (mini-g4, 1.25 GHz 7447A + Radeon 9200 32 MB):
//   * CPU: a 2.0 GHz deeply out-of-order 970FX — roughly 1.6x the 7447A
//     clock with far more IPC. The demo is CPU-bound on PPC, so this is
//     where the headroom is.
//   * GPU: a Radeon 9600 (RV350-class, real DX9 part with
//     ARB_fragment_program) and 128 MB VRAM — a full tier above the
//     9200 (which had no fragment program and only 32 MB). The VRAM-heavy
//     features the 9200 had to be careful with (retex, MSAA) are
//     comfortable here.
//   * Newer driver: Leopard 10.5.8 ATI stack vs Tiger 10.4.11.
//
// Strategy: start from the proven mini-g4 tune (everything it enables,
// the G5 can do at least as well) and push the knobs the better GPU/VRAM
// budget unlocks. Conservative-but-aggressive seed for the FIRST bench;
// the items tagged "A/B" below are the ones to validate/raise once we
// have demo1/demo2 numbers from the machine. gl_mode / resolution are
// deliberately NOT set here — bench.sh drives those via +set.

// Display ----------------------------------------------------------
// Native-resolution fullscreen via SAME-MODE CAPTURE. The R300 (Radeon
// 9600) Leopard driver hard-hangs the whole OS on a non-native fullscreen
// mode SWITCH; vid_desktopfullscreen makes the engine request the panel's
// current desktop resolution (1440x900 here) with no mode change, which
// the driver survives. Persists via CVAR_ARCHIVE — takes effect from the
// 2nd launch (1st launch is the engine default windowed mode, then the
// archived value is read before VID_Init thereafter). Bench/screenshot
// scripts set these explicitly on the cmdline, so this never colours a
// measurement. See ~/Desktop/imac-g5-leopard-port-notes.md.
set vid_fullscreen 1
set vid_desktopfullscreen 1

// Texture & VRAM ----------------------------------------------------
set gl_picmip 0                          // full texel detail — 128 MB VRAM
set gl_skymip 0                          // full-detail sky
set gl_round_down 0                      // round texture sizes UP for max quality
set gl_retexturing 1                     // hi-res textures ON — 128 MB VRAM is roomy (4x the 9200)
set gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear
set gl_anisotropic 16                    // 16x AF — RV350 supports the full degree; clamped to GL_MAX_TEXTURE_MAX_ANISOTROPY_EXT

// Dynamic lights ---------------------------------------------------
set gl_dynamic 1                         // full dlights — the 2 GHz 970 eats these for breakfast
set gl_flashblend 0                      // prefer real lightmap reblend

// Shadows / advanced surfaces --------------------------------------
set gl_shadows 1                         // alias drop shadows ON
set gl_stencilshadow 1                   // BENCHED 2026-05-31: real projected shadow volumes, ZERO fps cost (116.1 vs 115.9 @ native). The 60% cliff was an R9200/Tiger driver pathology — absent on the 9600/Leopard driver.
set gl_glows 1                           // sphere-map energy glow on shells; single-pass texgen, ~free on a 9600
set gl_trans_lighting 1                  // lightmap-modulate glass/grates; multitex pass, map-load latched
set gl_caustics 1                        // animated additive caustic shimmer on water
set gl_bloom 0                           // OFF — broken on the GL1 fixed-func path (see MISTAKES.md), prohibitive on PPC

// Particles --------------------------------------------------------
set gl_ext_pointparameters 1             // point sprites for particles
set gl_ext_multitexture 1                // mtex lightmaps
set gl_ext_mtexcombine 1                 // texture combiners
set gl_pointsprites 1                    // textured glow particle sprites (ARB_point_sprite)

// Frame submission -------------------------------------------------
set gl_finish 0
set gl_clear 0
set gl_ztrick 0
set gl_zfix 1                            // polygon-offset coplanar surfs — near-free
set gl_polyblend 1
set gl_lerpmodels 1                      // AltiVec lerp path (970 has AltiVec)

// View / cosmetic --------------------------------------------------
set gl_modulate 1
set gl_overbrightbits 4                  // Q3-style punchy lightmaps (4x sampler-stage scale, free on the combiner)
set intensity 2
set gl_minlight 8
set vid_gamma 1.0
set r_2D_unfiltered 1                    // HUD pics on GL_NEAREST regardless of gl_texturemode
set horplus 1

// Fog (cvar-driven GL_FOG) -----------------------------------------
set gl_fog 1
set gl_fog_mode 0
set gl_fog_start 64
set gl_fog_end 2048
set gl_fog_red 0.5
set gl_fog_green 0.5
set gl_fog_blue 0.55

// Waterwarp / lightmap subrect -------------------------------------
set gl_waterwarp 1
set gl_lightmap_subrect 1

// Group-draw — ON. Leopard ATI driver handles locked vertex arrays well.
set gl_groupdraw 1

// World decals -----------------------------------------------------
// More headroom than mini-g4 (faster CPU, 4x VRAM) — cap raised to 64.
set gl_decals 1
set gl_decal_max 64
set gl_decal_life 20                     // sec before fade starts
set gl_decal_fade 3                      // sec to fade fully out

// Client tier ------------------------------------------------------
set cl_maxfps 90                         // near the engine default (95); we have CPU
set cl_gun 2                             // full weapon lerp
set cl_particles 1
set cl_lights 1
set cl_blend 1
set cl_entities 1

// Sound ------------------------------------------------------------
set s_khz 44                             // full-rate 44 kHz mix

// MSAA (CVAR_LATCH — requires vid_restart to switch) ----------------
// 2x. BENCHED 2026-05-31 at native 1440x900 (the production res — the
// desktop-fullscreen path can't drop to a lower fullscreen res without a
// mode switch that hard-hangs the R300): 0x=116 fps, 2x=52.5 fps, 4x=27 fps.
// MSAA multiplies fragment work across the full native framebuffer and the
// Radeon 9600's fillrate is the wall. User pref is visuals over framerate
// (~50 fps is fine), so 2x is enabled for antialiased native-res edges at
// 52.5 fps. 4x (27 fps) is too low even by that bar; 0x (116 fps) is the
// fallback if a future map/scene drops live play under ~45.
set gl_msaa_samples 2
