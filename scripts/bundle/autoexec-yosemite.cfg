// yquake2 5.11 — per-machine autoexec for yosemite
//   PowerMac1,1 (1999) — PPC 750 @ 449 MHz, ATI Rage 128 16 MB, 10.3.9 Panther
//   Fat binary slice: ppc_750
//
// 2026-05-21 ULTIMATE
// -------------------
// After the R_ApplyGLBuffer texenv fix (78c26f2) the R128 turns out to
// be more capable than we'd thought. The original cfg conservatively
// disabled trilinear / picmip 0 / shadows / fog because "the chip is
// fillrate-bound". Per-knob bench (2026-05-21) of each individually:
//   +picmip 0:    31.50 → 29.80 fps  (-1.7)  picmip 0 doubles texels/axis
//   +trilinear:   31.50 → 30.80 fps  (-0.7)  per-fragment extra mip sample
//   +shadows 1:   31.50 → 30.40 fps  (-1.1)  per-alias-model alpha pass
//   +fog 1:       31.50 → 30.90 fps  (-0.6)  per-fragment fog blend
//   +groupdraw 1: 31.50 → 30.75 fps  (-0.75) no visible benefit; SKIP
// Combined picmip0+trilinear+shadows+fog: 25.70 / 45.70 fps at 1024/640.
// Both stay comfortably above the 20 fps floor. Visual quality is now
// much closer to the G4 boxes — full-res world textures, trilinear mip
// transitions, alias drop shadows under enemies, linear fog atmosphere.
//
// Resolution + vsync deliberately NOT set here — bench.sh sets those.

// Texture & VRAM ----------------------------------------------------
set gl_picmip 0                          // ULTIMATE: full texel detail (was 1)
set gl_skymip 0                          // full-detail sky (was 1)
set gl_round_down 0                      // round UP to bigger pow2 — full quality (was 1)
set gl_retexturing 0                     // no HD pack shipped (latent capability — see docs/HD_PACK.md)
set gl_ext_palettedtexture 1             // 8-bit paletted via GL_EXT_paletted_texture
set gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // ULTIMATE: trilinear (was bilinear)
set gl_anisotropic 2                     // 2x AF — R128 chip max

// Dynamic lights ---------------------------------------------------
// Dlights still OFF — per-frame R_BuildLightMap + AGP upload is
// genuinely heavy and Q2 dlight-rich scenes spike to ~30% of frame
// time. Flashblend also off (alpha-blend billboards + R128 had a
// known-bad GL_ONE/GL_ONE blend bug on Panther per QS history).
set gl_dynamic 0
set gl_flashblend 0

// Shadows / decals -------------------------------------------------
set gl_shadows 1                         // ULTIMATE: alias drop shadows (was 0)
set gl_stencilshadow 0                   // R128 lacks stencil
set gl_glows 0                           // sphere-map shell glow OFF — GL_SPHERE_MAP texgen untested on the Panther R128 driver; shells are rare, revisit if wanted
set gl_trans_lighting 0           // OFF — R128 is fillrate-bound at 25fps; skip the extra glass lightmap pass

// Particles --------------------------------------------------------
set gl_ext_pointparameters 0             // R128's pointparameters is buggy; ext off
set gl_particle_square 1                 // Tier 2: force GL_POINTS path (1 vert/particle) — solid squares,
                                         //  much cheaper than R_DrawParticles2's 3-vert textured triangles.
                                         //  Works because Q2 only takes the GL_POINTS path when EITHER
                                         //  pointparameters is available OR gl_particle_square is set.

// Frame submission -------------------------------------------------
set gl_finish 0
set gl_clear 0
set gl_ztrick 0
set gl_zfix 1                            // polygon-offset coplanar surfs — kills decal/brush z-fighting (near-free)
set gl_polyblend 1
set gl_lerpmodels 1

// View / cosmetic --------------------------------------------------
set gl_modulate 1.5
set gl_overbrightbits 2
set intensity 1
set horplus 1

// Tier 2 — minimum lightmap value. yosemite has gl_dynamic 0 so unlit
// corners are pitch-black until a player flashlight or muzzle flash
// fires — but those are skipped on the R128 path too. m=16 lifts the
// lightmap floor enough to see geometry in shadows without washing
// out the contrast. Applied once at level load; zero per-frame cost.
set gl_minlight 16

// Tier 2 — HUD pics stay crisp under trilinear gl_texturemode. Without
// this the HUD numbers go fuzzy under GL_LINEAR_MIPMAP_LINEAR.
set r_2D_unfiltered 1

// Fog (Phase C, cvar-driven GL_FOG) --------------------------------
// 2026-05-21 ULTIMATE — ENABLED. Engine-default range (64..2048)
// keeps indoor surfaces only lightly fogged; cost ~0.6 fps demo1 1024.
// A tighter range (e.g. 128..1024, visually punchier) drops to ~24 fps
// because every fragment then hits the fog blend stage. The wide
// range trades a less dramatic effect for staying above the 25 fps
// mark with all other visuals on.
set gl_fog 1
set gl_fog_mode 0          // linear
set gl_fog_start 64
set gl_fog_end 2048
set gl_fog_red 0.5
set gl_fog_green 0.5
set gl_fog_blue 0.55

// Waterwarp (Phase C #2) — pure CPU sin() per frame, only underwater
set gl_waterwarp 1

// Lightmap subrect upload (Phase B #1) — silent no-op since gl_dynamic 0
set gl_lightmap_subrect 1

// Group-draw (Phase B #3) — OFF on yosemite.
// 2026-05-21 retest post-texenv-fix (78c26f2): gl_groupdraw=1 produces
// the same baseline fps (31.50 / 65.30 either way) when measured
// against gl_groupdraw=0. The earlier "R128 regression" was the texenv
// bug, not a driver preference. But isolated knob testing here shows
// ~-0.75 fps cost with no visible visual benefit, so stay on the
// immediate-mode path.
set gl_groupdraw 0

// World decals (KMQuake2 r_fragment.c port) ------------------------
// Bullet/blood/scorch marks on walls. Conservative cap on R128 16 MB:
// each decal is alpha-blended which is fillrate-heavy on the Rage 128.
// Eight live at once still gives a satisfying combat feel without
// dragging fps below the 20 floor.
set gl_decals 1
set gl_decal_max 8
set gl_decal_life 15                     // sec before fade starts
set gl_decal_fade 3                      // sec to fade fully out

// Client tier ------------------------------------------------------
set cl_maxfps 60                         // cap below 100 Hz CRT to leave CPU headroom
set cl_gun 1                             // weapon ON, stepped (lerp would lerp-cost the alias models we just added shadows to)

// Sound ------------------------------------------------------------
set s_khz 22                             // 22.05 kHz mix saves audio CPU on the 449 MHz G3

// MSAA (CVAR_LATCH — requires vid_restart to switch) ----------------
// R128 16 MB — MSAA tanks fillrate, off
set gl_msaa_samples 0
