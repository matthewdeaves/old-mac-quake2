// yquake2 5.11 — GENERIC per-arch baseline for the x86_64 (Intel) slice
//   Applies to ANY 64-bit Intel Mac that isn't one of the hand-tuned
//   fleet boxes (mini-intel / imac-2019).
//
// Two-layer config model (yquake2/src/common/misc.c):
//   Layer 1 — THIS file. dyld runs the x86_64 fat slice on any 64-bit
//             Intel Mac (Lion 10.7+), so this baseline is what loads.
//   Layer 2 — a per-machine overlay layered on top at runtime for the
//             known boxes; unknown Intel Macs keep just this baseline.
//
// Design: seeded from the PROVEN conservative x86 tune (autoexec-mini-
// intel, the Core 2 Duo + Intel GMA 950 — our weakest Intel GPU by far).
// Any 64-bit Intel Mac has a fast CPU (CPU-side work is effectively free)
// and at least GMA-950-class graphics, so we keep dynamic lights, alias
// shadows, retexturing and the multitex-combiner features ON: each of
// those is gated at runtime by GL extension availability, so a weaker
// GPU degrades gracefully rather than breaking. We stay off ANY ARB
// fragment-shader path (the GMA 950 has no fragment_program) — nothing
// here needs it. NOT seeded from imac-2019 on purpose: that overlay
// pushes settings a Polaris GPU eats for breakfast but an integrated
// chip would choke on.

// Display ----------------------------------------------------------
// Fullscreen by default, at the panel's NATIVE resolution via same-mode
// CAPTURE (vid_desktopfullscreen). Auto-fits any Intel iMac / MacBook
// built-in panel with no mode switch. Known fleet boxes (mini-intel ext
// display, imac-2019 5K + heavy MSAA) pin a specific res in their overlay
// instead. Applies from the 2nd launch (archived); bench/screenshot own
// the mode via cmdline +set.
set vid_fullscreen 1
set vid_desktopfullscreen 1

// Texture & VRAM ----------------------------------------------------
set gl_picmip 0                          // full texel detail — fast CPU decodes, any Intel GPU samples
set gl_skymip 0
set gl_round_down 0
set gl_retexturing 1                     // hi-res textures ON (harmless if no HD pack is present)
set gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear
set gl_anisotropic 8                     // GMA 950 cap; higher GPUs clamp safely upward

// Dynamic lights ---------------------------------------------------
set gl_dynamic 1                         // fast Intel CPU handles per-frame lightmap rebuild
set gl_flashblend 0                      // prefer real lightmap reblend

// Shadows / advanced surfaces --------------------------------------
set gl_shadows 1                         // alias drop shadows
set gl_stencilshadow 0                   // stencil path slow on integrated Intel; leave off generically
set gl_glows 1                           // sphere-map energy glow — runtime-gated by GL_ARB texgen, single-pass
set gl_trans_lighting 1                  // lightmapped glass/grates — runtime-gated multitex pass
set gl_caustics 1                        // additive water caustic shimmer — runtime-gated
set gl_bloom 0                           // WIP — disabled (renders incorrectly on GL1 fixed-func, see MISTAKES.md)

// Particles --------------------------------------------------------
set gl_ext_pointparameters 1
set gl_ext_multitexture 1
set gl_ext_mtexcombine 1

// Frame submission -------------------------------------------------
set gl_finish 0                          // Apple's Intel GMA driver stalls badly on glFinish — never enable
set gl_clear 0
set gl_ztrick 0
set gl_zfix 1
set gl_polyblend 1

// View / cosmetic --------------------------------------------------
set gl_modulate 1
set gl_overbrightbits 4                  // Q3-style punchy lightmaps via the combiner (cost == 2x, just a mode flag)
set intensity 2
set vid_gamma 1.0
set horplus 1
set r_2D_unfiltered 1
set gl_farsee 1                          // extended far clip (CVAR_LATCH) — fps-free on any Intel CPU, draws more distant geometry

// Fog --------------------------------------------------------------
set gl_fog 1
set gl_fog_mode 0
set gl_fog_start 64
set gl_fog_end 2048
set gl_fog_red 0.5
set gl_fog_green 0.5
set gl_fog_blue 0.55

// Waterwarp / lightmap subrect / group-draw ------------------------
set gl_waterwarp 1
set gl_lightmap_subrect 1
set gl_groupdraw 1

// Client / sound ---------------------------------------------------
set cl_maxfps 95                         // engine default — fast CPU has the budget
set cl_gun 2                             // full weapon lerp
set cl_particles 1
set cl_lights 1
set cl_blend 1
set cl_entities 1
set s_khz 44                             // full-rate mix

// World decals -----------------------------------------------------
set gl_decals 1
set gl_decal_max 64
set gl_decal_life 20
set gl_decal_fade 3

// MSAA (CVAR_LATCH) — 2x is cheap even on the GMA 950.
set gl_msaa_samples 2

// Textured point-sprite particles (GL_ARB_point_sprite) ------------
set gl_pointsprites 1
