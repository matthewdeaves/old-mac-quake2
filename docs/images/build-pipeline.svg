<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 1020" font-family="-apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="bp-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3a3a3a"/>
    </marker>
    <marker id="bp-ar-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e95420"/>
    </marker>
    <marker id="bp-ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f8a5f"/>
    </marker>
    <marker id="bp-ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b6dd5"/>
    </marker>
    <filter id="bp-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1320" height="1020" fill="#faf6ef"/>

  <!-- Title -->
  <text x="660" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">Build pipeline: four slices, one fat binary</text>
  <text x="660" y="76" text-anchor="middle" font-size="14" fill="#666"><tspan font-family="ui-monospace, Menlo, Consolas, monospace">scripts/build-fat.sh</tspan> on Ubuntu: runs four flock-serialised sub-builds on the Lion mini, then lipos them into one Mach-O universal</text>

  <!-- Vertical guide rail with stage numbers down the left -->
  <g transform="translate(50, 130)">
    <line x1="0" y1="0" x2="0" y2="800" stroke="#e6dec5" stroke-width="2"/>
  </g>

  <!-- ============================================================ -->
  <!-- Stage 1                                                         -->
  <!-- ============================================================ -->
  <g transform="translate(0, 130)">
    <circle cx="50" cy="40" r="20" fill="#e95420" stroke="#fff" stroke-width="3"/>
    <text x="50" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">1</text>

    <g transform="translate(100, 0)">
      <rect x="0" y="0" width="1170" height="92" rx="10" fill="#ffffff" stroke="#e0d8c0" stroke-width="1" filter="url(#bp-shadow)"/>
      <rect x="0" y="0" width="6" height="92" rx="3" fill="#e95420"/>
      <text x="22" y="28" font-size="15" font-weight="700" fill="#1a1a1a">Edit on Ubuntu</text>
      <text x="22" y="48" font-size="12" fill="#777">All editing happens on Linux. Lion is never touched directly except as a build slave.</text>
      <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#444">
        <text x="22" y="74">~/quake2/yquake2/src/*.{c,h,m}   ·   git, vim/Claude Code, scripts/</text>
      </g>
    </g>
  </g>

  <!-- arrow 1 → 2 -->
  <g stroke="#e95420" stroke-width="2" fill="none">
    <path d="M 50 222 L 50 254" marker-end="url(#bp-ar-orange)"/>
  </g>
  <text x="68" y="244" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" font-weight="700" fill="#e95420">$ scripts/build-fat.sh</text>

  <!-- ============================================================ -->
  <!-- Stage 2 :: rsync                                                -->
  <!-- ============================================================ -->
  <g transform="translate(0, 260)">
    <circle cx="50" cy="40" r="20" fill="#e95420" stroke="#fff" stroke-width="3"/>
    <text x="50" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">2</text>

    <g transform="translate(100, 0)">
      <rect x="0" y="0" width="1170" height="78" rx="10" fill="#fff5e9" stroke="#e7c79c" stroke-width="1.2" filter="url(#bp-shadow)"/>
      <text x="22" y="28" font-size="14" font-weight="700" fill="#1a1a1a">Sync sources Ubuntu → mini-intel</text>
      <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#444">
        <text x="22" y="56">rsync -av --partial --inplace --delete --exclude=.git --exclude='*.o' --exclude=build/ --exclude=benchmarks/ --exclude=prereqs/  ~/quake2/  mini-intel:quake2/</text>
      </g>
    </g>
  </g>

  <!-- arrow 2 → 3 (split into 3 visible legs) -->
  <g stroke="#3a3a3a" stroke-width="1.6" fill="none">
    <path d="M 50 348 L 50 380"/>
    <path d="M 50 380 L 1129 380"/>
    <path d="M 241 380 L 241 414" marker-end="url(#bp-ar)"/>
    <path d="M 537 380 L 537 414" marker-end="url(#bp-ar)"/>
    <path d="M 833 380 L 833 414" marker-end="url(#bp-ar)"/>
    <path d="M 1129 380 L 1129 414" marker-end="url(#bp-ar)"/>
  </g>
  <text x="68" y="372" font-size="11" font-style="italic" fill="#666">four sub-builds, one at a time (flock-guarded: concurrent makes race on .o files)</text>

  <!-- ============================================================ -->
  <!-- Stage 3 :: three sub-builds                                     -->
  <!-- ============================================================ -->
  <g transform="translate(0, 416)">
    <circle cx="50" cy="42" r="20" fill="#4c83c4" stroke="#fff" stroke-width="3"/>
    <text x="50" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">3</text>

    <text x="100" y="22" font-size="15" font-weight="700" fill="#1a1a1a">Compile each slice on the Lion mini</text>
    <text x="100" y="42" font-size="12" fill="#777"><tspan font-family="ui-monospace, Menlo, Consolas, monospace">yquake2/Makefile</tspan> · MACH_TYPE=ppc|x86_64 · install_name_tool patches @executable_path/SDL.framework</text>

    <!-- Four toolchain cards in a row -->
    <g transform="translate(100, 56)">
      <!-- g3 -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="282" height="140" rx="10" fill="#ffffff" stroke="#cdd9c8" stroke-width="1" filter="url(#bp-shadow)"/>
        <rect x="0" y="0" width="6" height="140" rx="3" fill="#5fb1d8"/>
        <text x="20" y="26" font-size="14" font-weight="700" fill="#1a1a1a">build.sh g3</text>
        <text x="20" y="44" font-size="11" fill="#888">PowerPC 750 · Panther 10.3.9</text>
        <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#333">
          <text x="20" y="68">CC = /usr/bin/gcc-4.0</text>
          <text x="20" y="84">SDK = MacOSX10.3.9.sdk</text>
          <text x="20" y="100">CFLAGS = -mcpu=750 -O3</text>
          <text x="20" y="116">         -arch ppc -mmacosx-version-min=10.3</text>
        </g>
      </g>
      <!-- g4 -->
      <g transform="translate(296, 0)">
        <rect x="0" y="0" width="282" height="140" rx="10" fill="#ffffff" stroke="#d3cce4" stroke-width="1" filter="url(#bp-shadow)"/>
        <rect x="0" y="0" width="6" height="140" rx="3" fill="#8b5cf6"/>
        <text x="20" y="26" font-size="14" font-weight="700" fill="#1a1a1a">build.sh g4</text>
        <text x="20" y="44" font-size="11" fill="#888">PowerPC 7400 + AltiVec · Tiger 10.4</text>
        <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#333">
          <text x="20" y="68">CC = /usr/bin/gcc-4.0</text>
          <text x="20" y="84">SDK = MacOSX10.4u.sdk</text>
          <text x="20" y="100">CFLAGS = -mcpu=7400 -maltivec</text>
          <text x="20" y="116">         -mabi=altivec -mtune=7450 -O3</text>
        </g>
      </g>
      <!-- g5 -->
      <g transform="translate(592, 0)">
        <rect x="0" y="0" width="282" height="140" rx="10" fill="#ffffff" stroke="#e7cf9c" stroke-width="1" filter="url(#bp-shadow)"/>
        <rect x="0" y="0" width="6" height="140" rx="3" fill="#d08700"/>
        <text x="20" y="26" font-size="14" font-weight="700" fill="#1a1a1a">build.sh g5</text>
        <text x="20" y="44" font-size="11" fill="#888">PowerPC 970 + AltiVec · Leopard 10.5</text>
        <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#333">
          <text x="20" y="68">CC = /usr/bin/gcc-4.0</text>
          <text x="20" y="84">SDK = MacOSX10.5.sdk</text>
          <text x="20" y="100">CFLAGS = -mcpu=970 -maltivec</text>
          <text x="20" y="116">         -mabi=altivec -O3 -DQ2_ARCH_PPC970</text>
        </g>
      </g>
      <!-- lion -->
      <g transform="translate(888, 0)">
        <rect x="0" y="0" width="282" height="140" rx="10" fill="#ffffff" stroke="#bfe2d4" stroke-width="1" filter="url(#bp-shadow)"/>
        <rect x="0" y="0" width="6" height="140" rx="3" fill="#10b981"/>
        <text x="20" y="26" font-size="14" font-weight="700" fill="#1a1a1a">build.sh lion</text>
        <text x="20" y="44" font-size="11" fill="#888">x86_64 · Lion 10.7 · native</text>
        <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#333">
          <text x="20" y="68">CC = /usr/bin/clang  (Apple LLVM 2.9)</text>
          <text x="20" y="84">SDK = (default Lion toolchain)</text>
          <text x="20" y="100">CFLAGS = -arch x86_64 -O3</text>
          <text x="20" y="116">         -mmacosx-version-min=10.7</text>
        </g>
      </g>
    </g>

    <!-- Output slice labels under each card (centres: 141 437 733 1029) -->
    <g transform="translate(100, 210)" font-size="11" font-weight="700" fill="#0f8a5f">
      <text x="141" y="0" text-anchor="middle">→ ppc750 slice</text>
      <text x="141" y="14" text-anchor="middle" font-weight="500" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#666">build/q2-g3</text>

      <text x="437" y="0" text-anchor="middle">→ ppc7400 slice</text>
      <text x="437" y="14" text-anchor="middle" font-weight="500" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#666">build/q2-g4</text>

      <text x="733" y="0" text-anchor="middle">→ ppc970 slice</text>
      <text x="733" y="14" text-anchor="middle" font-weight="500" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#666">build/q2-g5</text>

      <text x="1029" y="0" text-anchor="middle">→ x86_64 slice</text>
      <text x="1029" y="14" text-anchor="middle" font-weight="500" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#666">build/q2-lion</text>
    </g>
  </g>

  <!-- arrows from each sub-build down to lipo manifold -->
  <g stroke="#0f8a5f" stroke-width="1.8" fill="none">
    <path d="M 241 656 L 241 690"/>
    <path d="M 537 656 L 537 690"/>
    <path d="M 833 656 L 833 690"/>
    <path d="M 1129 656 L 1129 690"/>
    <!-- horizontal manifold -->
    <path d="M 241 690 L 1129 690"/>
    <!-- merge down to lipo box -->
    <path d="M 660 690 L 660 728" marker-end="url(#bp-ar-green)"/>
  </g>
  <text x="660" y="710" text-anchor="middle" font-size="10.5" font-style="italic" fill="#0f8a5f">four slices ready · lipo runs on Lion (Linux doesn't ship lipo)</text>

  <!-- ============================================================ -->
  <!-- Stage 4 :: lipo                                                 -->
  <!-- ============================================================ -->
  <g transform="translate(0, 730)">
    <circle cx="50" cy="42" r="20" fill="#3b6dd5" stroke="#fff" stroke-width="3"/>
    <text x="50" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">4</text>

    <g transform="translate(330, 0)">
      <rect x="0" y="0" width="660" height="92" rx="10" fill="#ffffff" stroke="#a8c5e2" stroke-width="1.4" filter="url(#bp-shadow)"/>
      <rect x="0" y="0" width="6" height="92" rx="3" fill="#3b6dd5"/>
      <text x="22" y="28" font-size="14" font-weight="700" fill="#1a1a1a">lipo on Lion</text>
      <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" fill="#444">
        <text x="22" y="54">scp 4 slices → /tmp/ on mini-intel</text>
        <text x="22" y="74">lipo -create  q2-{g3,g4,g5,lion}  -output  q2-fat</text>
      </g>
    </g>
  </g>

  <!-- arrow 4 → 5 -->
  <g stroke="#3b6dd5" stroke-width="2" fill="none">
    <path d="M 660 822 L 660 856" marker-end="url(#bp-ar-blue)"/>
  </g>
  <text x="676" y="846" font-size="11" font-style="italic" fill="#666">scp back to Ubuntu</text>

  <!-- ============================================================ -->
  <!-- Stage 5 :: deliverable                                          -->
  <!-- ============================================================ -->
  <g transform="translate(0, 858)">
    <circle cx="50" cy="42" r="20" fill="#0f8a5f" stroke="#fff" stroke-width="3"/>
    <text x="50" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">5</text>

    <g transform="translate(330, 0)">
      <rect x="0" y="0" width="660" height="84" rx="10" fill="#eaf6ee" stroke="#a3cfb3" stroke-width="1.4" filter="url(#bp-shadow)"/>
      <text x="22" y="32" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="15" font-weight="700" fill="#1a1a1a">build/q2-fat</text>
      <text x="22" y="54" font-size="12" fill="#444">Mach-O universal · 4 slices: ppc750 + ppc7400 + ppc970 + x86_64 · ~5 KB padding overhead vs sum-of-slices</text>
      <text x="22" y="74" font-size="11.5" fill="#0f8a5f" font-weight="600"><tspan font-family="ui-monospace, Menlo, Consolas, monospace">deploy.sh &lt;machine&gt;</tspan> ships the same Quake2.app to every host: dyld picks the right slice automatically</text>
    </g>
  </g>

  <!-- footer -->
  <g transform="translate(50, 990)">
    <line x1="0" y1="-12" x2="1220" y2="-12" stroke="#e0d8c0" stroke-width="1"/>
    <text x="0" y="6" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" fill="#888">scripts/build.sh · scripts/build-fat.sh · scripts/deploy.sh</text>
    <text x="1220" y="6" text-anchor="end" font-size="10.5" fill="#888">flock at <tspan font-family="ui-monospace, Menlo, Consolas, monospace" fill="#666">build/.build.lock</tspan> serialises concurrent build.sh invocations</text>
  </g>
</svg>
