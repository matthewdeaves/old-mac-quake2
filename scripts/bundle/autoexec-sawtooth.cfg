// yquake2 5.11 — per-machine autoexec for sawtooth
//   PowerMac3,1 (1999) — PPC 7400 @ 500 MHz, NVIDIA GeForce2 MX 32 MB, 10.4.11 Tiger
//   Fat binary slice: ppc_7400
//
// Design rationale
// ----------------
// Second-slowest box: the GeForce2 MX is faster than yosemite's Rage 128
// at fillrate but still a fixed-function 1999 part with no fragment
// shader path. Baseline (vanilla 5.11): demo1 640 = 16 fps, 1024 = 14 fps.
// Worse than yosemite at the same demo — the bottleneck on this box is
// the 500 MHz G4 CPU more than the GPU. We trim CPU work (particles,
// dynamic lights, retexturing) before GPU work.
//
// GeForce2 MX does have:
//   * GL_NV_register_combiners (good for our gl_ext_mtexcombine path)
//   * 32 MB VRAM — twice yosemite's budget, so we can leave gl_picmip
//     less aggressive and consider retexturing (but the CPU cost of
//     decoding TGAs on the 500 MHz 7400 is the limiting factor, so off).
//
// Resolution + vsync are NOT set here for the same bench-compatibility
// reason as autoexec-yosemite.cfg — see that file for the explanation.

// Texture & VRAM ----------------------------------------------------
// Phase-C-unlock 2026-05-19: sawtooth Phase A baseline measured 95 fps
// demo1 640, 83 fps 1024 — well above the 60 fps playability floor.
// Promoted to full texel detail + trilinear since the GPU clearly has
// room. gl_retexturing left OFF because we don't ship a hi-res pack and
// the 500 MHz G4 would pay TGA-decode cost at map-load on user packs.
set gl_picmip 0                          // full texel detail
set gl_skymip 0                          // full-detail sky
set gl_round_down 0                      // round UP to bigger pow2 sizes
set gl_retexturing 0                     // still off — see comment above
set gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear filtering
// 2026-05-19: GF2 MX supports EXT_texture_filter_anisotropic up to 2x
// (NV15/NV11 hardware limit). Cheap quality win — sharpens textures on
// shallow-angle floors and walls without measurable fps cost on a 1999
// fixed-function pipe (filter happens at the texture sampler, not as
// extra passes). 4x would be silently clamped by the driver.
set gl_anisotropic 2                     // 2x AF — chip's max

// Dynamic lights ---------------------------------------------------
// 2026-05-19 try-2 (FAILED): with the lightmap subrect upload now landed
// (Phase B #1, commit 937a870), I retried gl_dynamic 1 hoping the subrect
// bandwidth savings would make the GF2 MX viable. Result: 15 fps demo1
// 1024×768 AND 15 fps demo1 640×480 — identical at half the pixel count,
// proving the bottleneck is CPU lightmap-rebuild (R_BuildLightMap +
// R_AddDynamicLights per-luxel float math), NOT AGP bandwidth. The
// subrect optimization helps the GPU transfer, not the CPU work.
//
// 2026-05-19 try-3: switch to gl_flashblend 1. Billboard halos at each
// dlight position via additive triangle-fan (R_RenderDlight) — completely
// skips the surface-relight code path. Cheap visual that still shows
// "there's a light here". Different aesthetic from surface modulation
// but classic 90s-Quake look.
set gl_dynamic 0                         // CPU-bound on 500 MHz G4; see MISTAKES.md
set gl_flashblend 1                      // cheap billboard halos at dlight positions

// Shadows ----------------------------------------------------------
// Phase-C-unlock: alias drop shadows ON. Visual depth cue, cheap blend.
set gl_shadows 1                         // alias drop shadows
set gl_stencilshadow 0                   // stencil shadows need an ARB path we don't have here

// Particles --------------------------------------------------------
// GeForce2 MX point parameters extension is OK but the chip is CPU-feed
// bound, so reducing per-particle CPU work pays off.
set gl_ext_pointparameters 1             // chip supports it well — keep on
set gl_particle_min_size 1               // smaller minimum (less overdraw at distance)
set gl_particle_max_size 32              // tighter cap than default 40

// Tier 2 — minimum lightmap value. gl_dynamic 0 keeps unlit corners
// dark; m=8 lifts them slightly without crushing contrast.
set gl_minlight 8

// Tier 2 — HUD pics on GL_NEAREST regardless of gl_texturemode
set r_2D_unfiltered 1

// Frame submission -------------------------------------------------
set gl_finish 0                          // CPU stall — particularly bad on 500 MHz G4
set gl_clear 0                           // skip redundant color clear (world covers screen)
set gl_ztrick 0                          // unreliable on 1999 NVIDIA fixed-function
set gl_polyblend 1                       // gameplay feedback — cheap on NVIDIA
set gl_lerpmodels 1                      // CPU-cheap on G4 SIMD

// View / cosmetic --------------------------------------------------
set gl_modulate 1.4                      // mild brightening — GeForce2 MX fixed-function looks gloomy
set gl_overbrightbits 2                  // engine default
set intensity 2                          // engine default — GeForce2 MX handles it
set horplus 1                            // hor+ fov scaling

// Fog (Phase C, cvar-driven GL_FOG) --------------------------------
// GeForce2 MX has fixed-function GL_FOG essentially free. Linear mode
// for predictability across the demo's varied lighting.
set gl_fog 1
set gl_fog_mode 0          // 0=linear 1=exp 2=exp2
set gl_fog_start 64
set gl_fog_end 2048
set gl_fog_red 0.5
set gl_fog_green 0.5
set gl_fog_blue 0.55

// Waterwarp (Phase C #2) — underwater sin-warp via projection matrix
set gl_waterwarp 1

// Lightmap subrect upload (Phase B #1) — upload only dirty columns
// of the dynamic lightmap atlas each frame. gl_dynamic 0 machines
// (yosemite, sawtooth) execute no dynamic upload anyway, so this is
// a silent no-op on them. ON by default.
set gl_lightmap_subrect 1

// Group-draw (Phase B #3) — ON by default on sawtooth. Not yet bench-
// validated on this box (GF2 MX / Tiger driver). NVidia's Tiger driver
// for the GF2 MX is generally newer + better-engineered than ATI's
// Panther R128 driver, so vertex-array dispatch is expected to be at
// least as fast as immediate-mode here. Re-bench after first power-up
// and flip to 0 if a regression shows up.
set gl_groupdraw 1                       // default ON; bench-confirm on first run

// Client tier ------------------------------------------------------
set cl_maxfps 60                         // 500 MHz G4 can't sustain >60 anyway; cap to give CPU room
set cl_gun 1                             // weapon ON, no frame interp

// Sound ------------------------------------------------------------
set s_khz 22                             // 22 kHz mix — same logic as yosemite, save CPU
