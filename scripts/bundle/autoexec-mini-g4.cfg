// yquake2 5.11 — per-machine autoexec for mini-g4
//   PowerMac10,1 (2005) — PPC 7447A @ 1.25 GHz, ATI Radeon 9200 32 MB, 10.4.11 Tiger
//   Fat binary slice: ppc_7400 (binary compatible with 7447A)
//
// Design rationale
// ----------------
// Fastest PPC box. The 1.25 GHz 7447A has roughly 2.5x the CPU of the
// 733 MHz quicksilver, but the Radeon 9200 is one tier BELOW the
// quicksilver's 9000 Pro on shader features (no ARB_fragment_program
// on 9200) and has only 32 MB VRAM. Baseline (vanilla 5.11):
// demo1 640 = 143 fps, 1024 = 113 fps — best PPC numbers in the fleet
// despite the GPU step-down, because the demo is CPU-bound and this
// chip has the CPU.
//
// Strategy: turn quality UP (we have CPU headroom and fillrate room
// at 1024), but be moderate about VRAM-heavy features since 32 MB is
// not 64 MB. Same fixed-function fragment path as the Radeon 9000 —
// no shader-based tricks.

// Texture & VRAM ----------------------------------------------------
set gl_picmip 0                          // full texel detail at 32 MB VRAM
set gl_skymip 0                          // full-detail sky
set gl_round_down 0                      // round texture sizes UP for max quality
set gl_retexturing 1                     // hi-res textures ON — 32 MB is tight but viable for 1024 res
set gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear; R9200 fillrate handles it
set gl_anisotropic 16                    // 16x AF — value is the AF degree, clamped to GL_MAX_TEXTURE_MAX_ANISOTROPY_EXT (=16 on R200). Bench-neutral at demo res (commit c07b6eb: "R200=16")

// Dynamic lights ---------------------------------------------------
set gl_dynamic 1                         // full dlights — chip + 1.25 GHz CPU handle it easily
set gl_flashblend 0                      // prefer real lightmap reblend

// Shadows ----------------------------------------------------------
set gl_shadows 1                         // alias drop shadows ON
set gl_stencilshadow 0                   // R9200 supports stencil but the per-fragment GL_INCR path runs on a very slow driver code-path on the Tiger ATI driver — bench-validated 60% fps loss (103.6 → 40.6 fps demo2 1024). Blob shadow only.
set gl_glows 1                           // sphere-map energy glow on quad/invuln/etc. shells; single-pass texgen, ~free on R9200 multitex
set gl_trans_lighting 1           // lightmap-modulate glass/grates (KMQuake2 r_trans_lighting); multitex pass, map-load latched
set gl_caustics 1                 // animated additive caustic shimmer on water surfaces
set gl_bloom 0                    // available; OFF by default — fullscreen post is fillrate-heavy, A/B before enabling

// Particles --------------------------------------------------------
set gl_ext_pointparameters 1             // point sprites for particles
set gl_ext_multitexture 1                // mtex lightmaps
set gl_ext_mtexcombine 1                 // texture combiners

// Frame submission -------------------------------------------------
set gl_finish 0
set gl_clear 0
set gl_ztrick 0
set gl_zfix 1                            // polygon-offset coplanar surfs — kills decal/brush z-fighting (near-free)
set gl_polyblend 1

// View / cosmetic --------------------------------------------------
set gl_modulate 1                        // engine default
// 2026-05-19: GL_RGB_SCALE_EXT 4 in the multitex combiner — Q3-style
// punchy lightmaps. R9200 fixed-function supports ARB_texture_env_combine
// and 4x sampler-stage scale at no extra cost vs 2x.
set gl_overbrightbits 4                  // Q3-style punchy lightmaps
set intensity 2                          // engine default
set vid_gamma 1.0
set horplus 1

// Fog (Phase C, cvar-driven GL_FOG) --------------------------------
// R9200 fixed-function GL_FOG is cheap; mini-g4 has fps headroom to spare.
set gl_fog 1
set gl_fog_mode 0
set gl_fog_start 64
set gl_fog_end 2048
set gl_fog_red 0.5
set gl_fog_green 0.5
set gl_fog_blue 0.55

// Waterwarp (Phase C #2) — underwater sin-warp via projection matrix
set gl_waterwarp 1

// Lightmap subrect upload (Phase B #1) — upload only dirty columns
// of the dynamic lightmap atlas each frame. gl_dynamic 0 machines
// (yosemite, sawtooth) execute no dynamic upload anyway, so this is
// a silent no-op on them. ON by default.
set gl_lightmap_subrect 1

// Group-draw (Phase B #3) — ON. R9200 / Tiger has the same ATI driver
// generation as quicksilver's R9000 Pro (post-Panther), so the same
// expectation applies. Not yet bench-validated.
set gl_groupdraw 1

// Client tier ------------------------------------------------------
set cl_maxfps 90                         // closer to the engine default (95); we have CPU
set cl_gun 2                             // full weapon lerp
set cl_particles 1
set cl_lights 1
set cl_blend 1
set cl_entities 1

// Sound ------------------------------------------------------------
set s_khz 44                             // full-rate 44 kHz mix

// Tier 2 — HUD pics on GL_NEAREST regardless of gl_texturemode
set r_2D_unfiltered 1

// World decals (KMQuake2 r_fragment.c port) ------------------------
// Bullet/blood/scorch marks on walls.
set gl_decals 1
set gl_decal_max 32
set gl_decal_life 20                     // sec before fade starts
set gl_decal_fade 3                      // sec to fade fully out

// MSAA (CVAR_LATCH — requires vid_restart to switch) ----------------
// Radeon 9200 — same generation as 9000
set gl_msaa_samples 2

// Textured point sprite particles (GL_ARB_point_sprite) ------------
// Glow textured particles instead of solid squares — needs R9000+/GMA950+.
set gl_pointsprites 1
