// yquake2 5.11 — per-machine autoexec for mini-intel
//   Macmini2,1 (2007) — Core 2 Duo @ 2.33 GHz, Intel GMA 950 64 MB, 10.7.5 Lion
//   Fat binary slice: x86_64
//
// Design rationale
// ----------------
// First x86 box in the fleet, but the Intel GMA 950 is in many respects
// WEAKER than the Radeon 9000 Pro: it's an integrated chip with 64 MB
// VRAM carved from system RAM, no hardware T&L, and a notoriously slow
// fixed-function path on macOS (Apple's Intel GMA driver is one of the
// least-loved OpenGL drivers Apple ever shipped). Baseline (vanilla 5.11):
// demo1 640 = 59 fps (Quartz vsync-capped at 60), 1024 = 116 fps — the
// 1024 figure beats 640 because 640x480 hits a native mode that gates
// on vsync, while 1024 drops into a non-vsynced SDL path.
//
// Strategy: the Core 2 Duo CPU is fast (way faster than any G4), so
// CPU-side work is essentially free. GPU-side we treat the GMA 950
// like a slightly-better Radeon 9200 — keep retexturing, keep dlights
// + shadows, but stay off ANY ARB shader path (GMA 950 doesn't have
// fragment_program). 4x AF is the GMA's sweet spot.

// Texture & VRAM ----------------------------------------------------
gl_picmip 0                          // full texel detail
gl_skymip 0                          // full-detail sky
gl_round_down 0                      // round textures UP — Core 2 Duo can decode quickly, GMA can sample
gl_retexturing 1                     // hi-res textures ON
gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear filtering
gl_anisotropic 4                     // 4x AF — GMA 950 handles it; 8x is borderline

// Dynamic lights ---------------------------------------------------
gl_dynamic 1                         // full dlights — Core 2 Duo + GMA handle it
gl_flashblend 0                      // prefer real lightmap reblend

// Shadows ----------------------------------------------------------
gl_shadows 1                         // alias drop shadows ON
gl_stencilshadow 0                   // GMA 950 stencil path is iffy in the Lion driver; defer

// Particles --------------------------------------------------------
gl_ext_pointparameters 1             // GMA 950 point sprites work
gl_ext_multitexture 1                // mtex
gl_ext_mtexcombine 1                 // combiners

// Frame submission -------------------------------------------------
gl_finish 0                          // Apple's GMA driver stalls badly on glFinish — never enable
gl_clear 0
gl_ztrick 0
gl_polyblend 1

// View / cosmetic --------------------------------------------------
gl_modulate 1                        // engine default
gl_overbrightbits 2                  // engine default
intensity 2                          // engine default
vid_gamma 1.0
horplus 1

// Client tier ------------------------------------------------------
cl_maxfps 95                         // engine default — Core 2 Duo has full CPU budget
cl_gun 2                             // full weapon lerp
cl_particles 1
cl_lights 1
cl_blend 1
cl_entities 1

// Sound ------------------------------------------------------------
s_khz 44                             // full-rate 44 kHz mix
