// yquake2 5.11 — per-machine autoexec for imac-2019
//   iMac19,1 (2019) — i5-9600K @ 3.7 GHz, AMD Radeon Pro 580X 8 GB, 15.7 Sequoia
//   Fat binary slice: x86_64 (same slice as mini-intel, vastly different hardware)
//
// Design rationale
// ----------------
// Fastest box in the fleet by a wide margin. The Radeon Pro 580X has
// 8 GB of GDDR5, full GL 4.6 support, and runs Quake 2's fixed-function
// path so far inside its envelope that the limiting factor is the
// engine's own draw-call submission rate. The i5-9600K (6 cores,
// 3.7 GHz base) is several CPU generations beyond anything yquake2
// was designed for — pure overkill.
//
// Strategy: max every visual knob the 5.11 fixed-function path exposes.
// The only thing we can't do here is enable Phase C features
// (bloom / stencil shadows / fog) — those require engine work, not
// just cvar flips. Once Phase B/C cherry-picks land, this is the file
// that gets the most new lines.

// Texture & VRAM ----------------------------------------------------
set gl_picmip 0                          // full texel detail (8 GB VRAM laughs at 256x256 textures)
set gl_skymip 0                          // full-detail sky
set gl_round_down 0                      // round textures UP
set gl_retexturing 1                     // hi-res TGA/JPG/PNG textures ON
set gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear
set gl_anisotropic 16                    // max AF — 580X eats it for breakfast

// Dynamic lights ---------------------------------------------------
set gl_dynamic 1                         // full dlights
set gl_flashblend 0                      // real lightmap reblend looks better

// Shadows ----------------------------------------------------------
set gl_shadows 1                         // alias drop shadows
set gl_stencilshadow 0                   // Phase C — engine doesn't expose this on the 5.11 path yet

// Particles --------------------------------------------------------
set gl_ext_pointparameters 1             // point sprites
set gl_ext_multitexture 1                // mtex
set gl_ext_mtexcombine 1                 // combiners
set gl_particle_min_size 2               // engine default — chip has fillrate for any size
set gl_particle_max_size 40
set gl_particle_size 40

// Frame submission -------------------------------------------------
set gl_finish 0
set gl_clear 0
set gl_ztrick 0
set gl_polyblend 1

// View / cosmetic --------------------------------------------------
set gl_modulate 1                        // engine default — modern driver hits proper brightness
// 2026-05-19: gl_overbrightbits is GL_RGB_SCALE_EXT in the multitex
// combiner (r_surf.c:991). 2 = doubling (engine default), 4 = quadrupling.
// 4x is the classic Quake 3 "punchy lightmaps" look. Polaris 20 + 8 GB
// VRAM laughs at any combiner setting. Mild brightening of bright
// surfaces, dramatic on dlight-touched walls during rocket explosions.
set gl_overbrightbits 4                  // Q3-style punchy lightmaps
set intensity 2                          // engine default
set vid_gamma 1.0
set horplus 1                            // hor+ fov scaling — looks right on the 5K iMac panel

// Fog (Phase C, cvar-driven GL_FOG) --------------------------------
// Polaris 20 with 8 GB VRAM laughs at fixed-function fog; push the
// view distance further to take advantage of the 5K panel.
set gl_fog 1
set gl_fog_mode 0
set gl_fog_start 64
set gl_fog_end 4096
set gl_fog_red 0.5
set gl_fog_green 0.5
set gl_fog_blue 0.55

// Waterwarp (Phase C #2) — underwater sin-warp via projection matrix
set gl_waterwarp 1

// Lightmap subrect upload (Phase B #1) — upload only dirty columns
// of the dynamic lightmap atlas each frame. gl_dynamic 0 machines
// (yosemite, sawtooth) execute no dynamic upload anyway, so this is
// a silent no-op on them. ON by default.
set gl_lightmap_subrect 1

// Group-draw (Phase B #3) — ON. Polaris 20 / Sequoia driver has full
// modern vertex-array support; immediate-mode is a deprecated path on
// macOS 15. Not bench-validated yet (display state issue on prior
// session) but no reasonable doubt this gains here.
set gl_groupdraw 1

// Client tier ------------------------------------------------------
set cl_maxfps 144                        // raised above engine default — modern panels do 60-144 Hz
set cl_gun 2                             // full weapon lerp
set cl_particles 1
set cl_lights 1
set cl_blend 1
set cl_entities 1

// Sound ------------------------------------------------------------
set s_khz 44                             // full-rate 44 kHz mix

// Tier 2 — HUD pics on GL_NEAREST regardless of gl_texturemode
set r_2D_unfiltered 1
