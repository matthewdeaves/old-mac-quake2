// yquake2 5.11 — per-machine autoexec for yosemite
//   PowerMac1,1 (1999) — PPC 750 @ 449 MHz, ATI Rage 128 16 MB, 10.3.9 Panther
//   Fat binary slice: ppc_750
//
// Design rationale
// ----------------
// Slowest box in the fleet. Baseline (vanilla 5.11, no autoexec):
// demo1 640x480 = 18.4 fps, 1024x768 = 14.7 fps — both UNDER the 20 fps
// playability floor. The Rage 128 is a 1999 fixed-function part with
// 16 MB VRAM, no fragment shader path, fillrate-bound under any
// alpha-blended or multi-pass workload. Everything in this file aims
// to claw back fps by disabling work the GPU can't do cheaply:
//
//   * dynamic lights are off (no lightmap re-touch GPU passes)
//   * paletted textures (8-bit) cut VRAM pressure roughly 4x
//   * gl_round_down + gl_picmip 1 = fewer texels per surface
//   * gl_retexturing 0 = stay on the 256x256 baseline textures (the
//     fleet's HD-pack drop would not fit in 16 MB anyway)
//   * particles use the cheapest path (no point parameters / mtex)
//   * gl_finish 0 + gl_ztrick 0 — known-bad on old fixed-function
//
// Resolution + vsync (gl_mode / gl_customwidth / gl_customheight /
// gl_swapinterval) are deliberately NOT set here. bench.sh forces those
// via +set on the command line and autoexec runs AFTER cmdline +set
// (engine order), so anything we put in autoexec would clobber the
// bench's per-resolution sweep. Users who want a particular default
// res should set it via the in-game video menu — it persists to
// ~/.yq2/baseq2/config.cfg.

// Texture & VRAM ----------------------------------------------------
gl_picmip 1                          // halve texel count per axis on world+model textures
gl_skymip 1                          // same for sky (uses lots of fillrate at 1024)
gl_round_down 1                      // round texture dims DOWN to nearest pow2 — saves VRAM, marginal quality cost
gl_retexturing 0                     // stay on 8-bit baseline textures; 16 MB VRAM can't host an HD pack
gl_ext_palettedtexture 1             // 8-bit paletted textures via GL_EXT_paletted_texture (Rage 128 supports it)
gl_texturemode GL_LINEAR_MIPMAP_NEAREST  // bilinear filter, point-sampled mip transitions — cheapest non-blocky path

// Dynamic lights ---------------------------------------------------
// Each dynamic light on a fixed-function GPU = one lightmap re-touch
// PLUS one extra surface re-blend pass per affected face. On Rage 128
// at demo1 1024 that's ~30% of frame time during dlight-heavy scenes.
gl_dynamic 0                         // no per-frame lightmap re-touch
gl_flashblend 0                      // billboard-glow path also can crash R128 (per QS yosemite experience)

// Shadows / decals -------------------------------------------------
gl_shadows 0                         // no alias drop shadows (extra alpha pass)
gl_stencilshadow 0                   // no stencil shadows (R128 may lack stencil buffer)

// Particles --------------------------------------------------------
// Point parameters extension exists on R128 but is a slow path for
// the chip. Keep multitex on (it's actually useful for lightmaps).
gl_ext_pointparameters 0             // emulate point sprites with quads — faster on R128

// Frame submission -------------------------------------------------
gl_finish 0                          // never glFinish — pure CPU-side stall, costs ~5% even on fast GPUs
gl_clear 0                           // skip color buffer clear (Quake's world+sky covers 100% of screen)
gl_ztrick 0                          // alternate-depth-range trick is known buggy on real fixed-function GPUs
gl_polyblend 1                       // damage/pickup full-screen tint — keep for gameplay feedback
gl_lerpmodels 1                      // alias frame interp is essentially free in CPU vs. visual benefit

// View / cosmetic --------------------------------------------------
gl_modulate 1.5                      // brighten texture * lightmap modulation (R128 looks gloomy at 1.0)
gl_overbrightbits 2                  // engine default — keep the lightmap punch
intensity 1                          // tame texture intensity (default 2 over-saturates with modulate 1.5)
horplus 1                            // hor+ fov scaling looks correct on any aspect

// Client tier ------------------------------------------------------
cl_maxfps 60                         // cap below the 100 hz native to leave CPU headroom for input + network
cl_gun 1                             // view-weapon ON but skip frame-interpolation (2 = lerp; 1 = stepped)

// Sound ------------------------------------------------------------
s_khz 22                             // 22.05 kHz mix; halves audio CPU vs. 44 kHz default on the 449 MHz G3
