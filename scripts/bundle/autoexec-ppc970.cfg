// yquake2 5.11 — GENERIC per-arch baseline for the ppc970 (G5) slice
//   Applies to ANY PowerPC G5 Mac, including the iMac G5 17" ALS
//   (PowerMac8,2, 970FX @ 2.0 GHz, Leopard 10.5.8) this slice was added
//   for. No per-machine overlay exists yet (the machine isn't on the
//   network) — that lands once we can SSH in and bench it.
//
// Two-layer config model (yquake2/src/common/misc.c):
//   Layer 1 — THIS file. The g5 build stamps cpusubtype ppc970 and sets
//             -DQ2_ARCH_PPC970, which misc.c checks FIRST (before the
//             __VEC__ → ppc7400 branch, since the 970 also has AltiVec
//             and Apple gcc emits no __ppc970__ macro). dyld runs the
//             ppc970 slice on any G5, so this baseline is what loads.
//   Layer 2 — none yet. When the iMac G5 is reachable, add
//             autoexec-imac-g5.cfg + a "PowerMac8,2" entry to the
//             hw.model map in misc.c, and it will layer on top of this.
//
// Design: CONSERVATIVELY seeded from the proven ppc7400 (G4/AltiVec)
// baseline so it is guaranteed not to regress. The 970FX is much faster
// than any G4 — a deep out-of-order 2 GHz core, and the iMac G5 likely
// pairs it with a Radeon 9600 (a real DX9 part) — so this is almost
// certainly leaving performance on the table: dynamic lights, hi-res
// retexturing, and the multitex-combiner features (glows / caustics /
// trans_lighting) are all plausibly affordable here. They stay OFF until
// first bench data proves it; real G5 tuning is deferred to the overlay.

// Display ----------------------------------------------------------
// Generic G5 default: native-resolution fullscreen via SAME-MODE CAPTURE
// (vid_desktopfullscreen). Auto-picks the panel's native res on ANY G5 —
// and on a G5 paired with an ATI R300 (Radeon 9600, as in the iMac G5) it
// is the ONLY safe fullscreen path: a non-native mode switch hard-hangs
// the Leopard ATI driver (full OS lockup). Harmless on NVIDIA G5s. The
// per-machine imac-g5 overlay repeats these; this is the floor for
// unmapped G5s. See ~/Desktop/imac-g5-leopard-port-notes.md.
set vid_fullscreen 1
set vid_desktopfullscreen 1

// Texture & VRAM ----------------------------------------------------
set gl_picmip 0
set gl_skymip 0
set gl_round_down 0
set gl_retexturing 0                     // conservative: enable once benched (970 + Radeon 9600 likely fine)
set gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear
set gl_anisotropic 2                     // conservative floor; a Radeon 9600 supports 16x — raise after bench

// Dynamic lights ---------------------------------------------------
// Held OFF (seeded from G4) pending bench data. The 2 GHz 970 can very
// likely afford full gl_dynamic 1 — first thing to try on the overlay.
set gl_dynamic 0
set gl_flashblend 1

// Shadows / advanced surfaces --------------------------------------
set gl_shadows 1
set gl_stencilshadow 0
set gl_glows 0                           // multitex feature — enable after bench (Radeon 9600 has the combiners)
set gl_trans_lighting 0                  //   "
set gl_caustics 0                        //   "
set gl_bloom 0

// Particles --------------------------------------------------------
set gl_ext_pointparameters 1
set gl_particle_min_size 1
set gl_particle_max_size 32

// Frame submission -------------------------------------------------
set gl_finish 0
set gl_clear 0
set gl_ztrick 0
set gl_zfix 1
set gl_polyblend 1
set gl_lerpmodels 1                      // AltiVec lerp path applies (the 970 has AltiVec)

// View / cosmetic --------------------------------------------------
set gl_modulate 1.4
set gl_overbrightbits 2
set intensity 2
set gl_minlight 8
set r_2D_unfiltered 1
set horplus 1

// Fog --------------------------------------------------------------
set gl_fog 1
set gl_fog_mode 0
set gl_fog_start 64
set gl_fog_end 2048
set gl_fog_red 0.5
set gl_fog_green 0.5
set gl_fog_blue 0.55

// Waterwarp / lightmap subrect -------------------------------------
set gl_waterwarp 1
set gl_lightmap_subrect 1

// Group-draw — ON (Leopard ATI/NVIDIA drivers handle vertex arrays well).
set gl_groupdraw 1

// World decals -----------------------------------------------------
set gl_decals 1
set gl_decal_max 16
set gl_decal_life 20
set gl_decal_fade 3

// Client / sound ---------------------------------------------------
// Conservative cap seeded from G4; the 970 can sustain more — raise on
// the overlay once benched.
set cl_maxfps 60
set cl_gun 1
set s_khz 22                             // raise to 44 on the overlay once benched

// MSAA (CVAR_LATCH) — off until benched (a Radeon 9600 could afford 2x).
set gl_msaa_samples 0
