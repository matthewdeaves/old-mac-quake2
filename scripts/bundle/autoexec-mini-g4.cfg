// yquake2 5.11 — per-machine autoexec for mini-g4
//   PowerMac10,1 (2005) — PPC 7447A @ 1.25 GHz, ATI Radeon 9200 32 MB, 10.4.11 Tiger
//   Fat binary slice: ppc_7400 (binary compatible with 7447A)
//
// Design rationale
// ----------------
// Fastest PPC box. The 1.25 GHz 7447A has roughly 2.5x the CPU of the
// 733 MHz quicksilver, but the Radeon 9200 is one tier BELOW the
// quicksilver's 9000 Pro on shader features (no ARB_fragment_program
// on 9200) and has only 32 MB VRAM. Baseline (vanilla 5.11):
// demo1 640 = 143 fps, 1024 = 113 fps — best PPC numbers in the fleet
// despite the GPU step-down, because the demo is CPU-bound and this
// chip has the CPU.
//
// Strategy: turn quality UP (we have CPU headroom and fillrate room
// at 1024), but be moderate about VRAM-heavy features since 32 MB is
// not 64 MB. Same fixed-function fragment path as the Radeon 9000 —
// no shader-based tricks.

// Texture & VRAM ----------------------------------------------------
gl_picmip 0                          // full texel detail at 32 MB VRAM
gl_skymip 0                          // full-detail sky
gl_round_down 0                      // round texture sizes UP for max quality
gl_retexturing 1                     // hi-res textures ON — 32 MB is tight but viable for 1024 res
gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear; R9200 fillrate handles it
gl_anisotropic 4                     // 4x AF — sweet spot for R9200 (8x is borderline)

// Dynamic lights ---------------------------------------------------
gl_dynamic 1                         // full dlights — chip + 1.25 GHz CPU handle it easily
gl_flashblend 0                      // prefer real lightmap reblend

// Shadows ----------------------------------------------------------
gl_shadows 1                         // alias drop shadows ON
gl_stencilshadow 0                   // Phase C — needs ARB stencil; 9200 supports stencil but defer

// Particles --------------------------------------------------------
gl_ext_pointparameters 1             // point sprites for particles
gl_ext_multitexture 1                // mtex lightmaps
gl_ext_mtexcombine 1                 // texture combiners

// Frame submission -------------------------------------------------
gl_finish 0
gl_clear 0
gl_ztrick 0
gl_polyblend 1

// View / cosmetic --------------------------------------------------
gl_modulate 1                        // engine default
gl_overbrightbits 2                  // engine default
intensity 2                          // engine default
vid_gamma 1.0
horplus 1

// Client tier ------------------------------------------------------
cl_maxfps 90                         // closer to the engine default (95); we have CPU
cl_gun 2                             // full weapon lerp
cl_particles 1
cl_lights 1
cl_blend 1
cl_entities 1

// Sound ------------------------------------------------------------
s_khz 44                             // full-rate 44 kHz mix
