// yquake2 5.11 — per-machine autoexec for quicksilver
//   PowerMac3,5 (2001) — PPC 7450 @ 733 MHz, ATI Radeon 9000 Pro 64 MB, 10.4.11 Tiger
//   Fat binary slice: ppc_7400 (binary compatible with 7450)
//
// Design rationale
// ----------------
// Middle-of-the-fleet: the Radeon 9000 Pro is the first GPU here with
// a real DX8.1 fragment pipeline (ARB_fragment_program available). 64 MB
// VRAM is comfortable. Baseline (vanilla 5.11): demo1 640 and 1024 both
// hit ~82 fps — CPU-bound on the 733 MHz 7450. Same fps at both res
// means we have a LOT of GPU headroom; pushing visual quality here is
// almost free until we hit the fillrate ceiling.
//
// Phase B (multitex / group-draw) is expected to mostly land on the
// CPU side and lift this box considerably. For Phase A baseline we
// turn ON things weak boxes had to skip: full dynamic lights, alias
// shadows, hi-res retexturing, mtex multitexturing.

// Texture & VRAM ----------------------------------------------------
set gl_picmip 0                          // engine default — full texel detail; 64 MB VRAM has room
set gl_skymip 0                          // full-detail sky
set gl_round_down 0                      // round texture sizes UP for max quality (more VRAM but we have it)
set gl_retexturing 1                     // hi-res TGA/JPG/PNG textures from WITH_RETEXTURING — payoff for the 64 MB
set gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear filtering (Radeon 9000 has the fillrate)
set gl_anisotropic 16                    // 16x AF — value is the AF degree, clamped to GL_MAX_TEXTURE_MAX_ANISOTROPY_EXT (=16 on R200); cheap on R9000 Pro (commit c07b6eb: "R200=16")

// Dynamic lights ---------------------------------------------------
set gl_dynamic 1                         // full dlights — chip handles it
set gl_flashblend 0                      // prefer real lightmap reblend (looks better than billboard glow)

// Shadows ----------------------------------------------------------
set gl_shadows 1                         // alias drop shadows — visual depth cue
set gl_stencilshadow 0                   // R9000 has the same slow stencil-INC driver path as the R9200 (mini-g4 saw -60% fps); blob shadow only on this GPU family

// Particles --------------------------------------------------------
set gl_ext_pointparameters 1             // R9000 supports point sprites natively
set gl_ext_multitexture 1                // 2-stage mtex for lightmaps in one pass
set gl_ext_mtexcombine 1                 // texture combiners for richer modulation

// Frame submission -------------------------------------------------
set gl_finish 0                          // never glFinish unless debugging
set gl_clear 0                           // skip color clear; world geometry covers screen
set gl_ztrick 0                          // not reliable cross-driver, default off
set gl_zfix 1                            // polygon-offset coplanar surfs — kills decal/brush z-fighting (near-free)
set gl_polyblend 1                       // damage tint ON

// View / cosmetic --------------------------------------------------
set gl_modulate 1                        // engine default — R9000 hits proper brightness without modulate boost
// 2026-05-19: GL_RGB_SCALE_EXT 4 in the multitex combiner — Q3-style
// punchy lightmaps. R9000 Pro supports ARB_texture_env_combine; 4x
// scale is sampler-stage, identical perf cost to 2x.
set gl_overbrightbits 4                  // Q3-style punchy lightmaps
set intensity 2                          // engine default
set vid_gamma 1.0                        // engine default
set horplus 1                            // hor+ fov scaling

// Fog (Phase C, cvar-driven GL_FOG) --------------------------------
// R9000 has plenty of fillrate; linear fog is cheap atmospheric polish.
set gl_fog 1
set gl_fog_mode 0
set gl_fog_start 64
set gl_fog_end 2048
set gl_fog_red 0.5
set gl_fog_green 0.5
set gl_fog_blue 0.55

// Waterwarp (Phase C #2) — underwater sin-warp via projection matrix
set gl_waterwarp 1

// Lightmap subrect upload (Phase B #1) — upload only dirty columns
// of the dynamic lightmap atlas each frame. gl_dynamic 0 machines
// (yosemite, sawtooth) execute no dynamic upload anyway, so this is
// a silent no-op on them. ON by default.
set gl_lightmap_subrect 1

// Group-draw (Phase B #3) — ON. R9000 Pro / Tiger driver supports
// vertex arrays cleanly via ARB_vertex_array. Not yet bench-validated
// on this box but expected to gain (R9000 has full DX8.1 fragment pipe
// and Apple's ATI driver post-Panther switched away from the legacy
// immediate-mode fast path that the R128 driver still used).
set gl_groupdraw 1

// Client tier ------------------------------------------------------
set cl_maxfps 72                         // headroom over typical CRT 60 Hz refresh — leaves CPU budget for AI/physics
set cl_gun 2                             // weapon ON with frame interp (2 = full lerp)
set cl_particles 1
set cl_lights 1
set cl_blend 1
set cl_entities 1

// Sound ------------------------------------------------------------
set s_khz 44                             // full-rate 44 kHz mix — 733 MHz handles it

// Tier 2 — HUD pics on GL_NEAREST regardless of gl_texturemode
set r_2D_unfiltered 1

// World decals (KMQuake2 r_fragment.c port) ------------------------
// Bullet/blood/scorch marks on walls.
set gl_decals 1
set gl_decal_max 32
set gl_decal_life 20                     // sec before fade starts
set gl_decal_fade 3                      // sec to fade fully out

// MSAA (CVAR_LATCH — requires vid_restart to switch) ----------------
// Radeon 9000 — 2x is essentially free on this chip
set gl_msaa_samples 2

// Textured point sprite particles (GL_ARB_point_sprite) ------------
// Glow textured particles instead of solid squares — needs R9000+/GMA950+.
set gl_pointsprites 1
