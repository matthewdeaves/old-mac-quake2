// yquake2 5.11 — shared default control scheme (ALL machines)
//
// Parity with the QuakeSpasm fleet build: modern WASD + mouse-look, A/D
// strafe. Stock yquake2 (stuff/yq2.cfg) ships the old ESDF Quake-II layout
// (e=+forward, s=+moveleft, a/g=turn, d=+back, f=+moveright) which is alien
// to anyone who learned FPS controls after ~2000. This cfg is execed FIRST
// in the bundle chain (before the per-arch baseline + per-machine overlay),
// so a machine cfg could still override a key if it ever needed to — none do.
//
// Loaded BEFORE CL_Init like the rest of the bundle config, so these binds
// are in place for the very first frame. They override stuff/yq2.cfg and the
// saved config.cfg; a user who rebinds in-game and wants it to stick should
// edit this file (same model as the QuakeSpasm sister build).

// Movement — WASD, A/D strafe -------------------------------------------
bind w +forward
bind s +back
bind a +moveleft
bind d +moveright

// Retire the stock ESDF leftovers so old keys don't surprise --------------
unbind e
unbind f
unbind g

// Jump / crouch ---------------------------------------------------------
bind SPACE +moveup        // jump (stock bound this to +movedown)
bind c +movedown          // crouch / swim-down

// Look ------------------------------------------------------------------
// Mouse-look on, non-inverted, no auto-centering, mouse doesn't strafe.
set freelook 1
set lookspring 0
set lookstrafe 0
set m_pitch 0.022
