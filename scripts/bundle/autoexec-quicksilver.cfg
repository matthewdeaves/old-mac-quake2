// yquake2 5.11 — per-machine autoexec for quicksilver
//   PowerMac3,5 (2001) — PPC 7450 @ 733 MHz, ATI Radeon 9000 Pro 64 MB, 10.4.11 Tiger
//   Fat binary slice: ppc_7400 (binary compatible with 7450)
//
// Design rationale
// ----------------
// Middle-of-the-fleet: the Radeon 9000 Pro is the first GPU here with
// a real DX8.1 fragment pipeline (ARB_fragment_program available). 64 MB
// VRAM is comfortable. Baseline (vanilla 5.11): demo1 640 and 1024 both
// hit ~82 fps — CPU-bound on the 733 MHz 7450. Same fps at both res
// means we have a LOT of GPU headroom; pushing visual quality here is
// almost free until we hit the fillrate ceiling.
//
// Phase B (multitex / group-draw) is expected to mostly land on the
// CPU side and lift this box considerably. For Phase A baseline we
// turn ON things weak boxes had to skip: full dynamic lights, alias
// shadows, hi-res retexturing, mtex multitexturing.

// Texture & VRAM ----------------------------------------------------
gl_picmip 0                          // engine default — full texel detail; 64 MB VRAM has room
gl_skymip 0                          // full-detail sky
gl_round_down 0                      // round texture sizes UP for max quality (more VRAM but we have it)
gl_retexturing 1                     // hi-res TGA/JPG/PNG textures from WITH_RETEXTURING — payoff for the 64 MB
gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear filtering (Radeon 9000 has the fillrate)
gl_anisotropic 4                     // 4x AF — looks great on angled floors, cheap on R9000

// Dynamic lights ---------------------------------------------------
gl_dynamic 1                         // full dlights — chip handles it
gl_flashblend 0                      // prefer real lightmap reblend (looks better than billboard glow)

// Shadows ----------------------------------------------------------
gl_shadows 1                         // alias drop shadows — visual depth cue
gl_stencilshadow 0                   // Phase C territory; off for baseline

// Particles --------------------------------------------------------
gl_ext_pointparameters 1             // R9000 supports point sprites natively
gl_ext_multitexture 1                // 2-stage mtex for lightmaps in one pass
gl_ext_mtexcombine 1                 // texture combiners for richer modulation

// Frame submission -------------------------------------------------
gl_finish 0                          // never glFinish unless debugging
gl_clear 0                           // skip color clear; world geometry covers screen
gl_ztrick 0                          // not reliable cross-driver, default off
gl_polyblend 1                       // damage tint ON

// View / cosmetic --------------------------------------------------
gl_modulate 1                        // engine default — R9000 hits proper brightness without modulate boost
gl_overbrightbits 2                  // engine default
intensity 2                          // engine default
vid_gamma 1.0                        // engine default
horplus 1                            // hor+ fov scaling

// Client tier ------------------------------------------------------
cl_maxfps 72                         // headroom over typical CRT 60 Hz refresh — leaves CPU budget for AI/physics
cl_gun 2                             // weapon ON with frame interp (2 = full lerp)
cl_particles 1
cl_lights 1
cl_blend 1
cl_entities 1

// Sound ------------------------------------------------------------
s_khz 44                             // full-rate 44 kHz mix — 733 MHz handles it
