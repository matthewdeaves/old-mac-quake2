// yquake2 5.11 — GENERIC per-arch baseline for the ppc750 (G3) slice
//   Applies to ANY PowerPC G3 Mac that isn't one of the hand-tuned fleet
//   boxes (see autoexec-yosemite.cfg for the Rage-128 PowerMac1,1 tune).
//
// Two-layer config model (yquake2/src/common/misc.c):
//   Layer 1 — THIS file. Selected at compile time: dyld runs the ppc750
//             fat slice on any G3, so this baseline is what loads.
//   Layer 2 — a per-machine overlay (autoexec-<hw.model>.cfg) layered on
//             top at runtime for the known boxes. Unknown G3s keep just
//             this baseline.
//
// Design: the FLOOR, not the ceiling. A generic G3 could be a beige
// PowerMac G3 with an ATI Rage II/Pro (far weaker than yosemite's Rage
// 128) on as little as 233 MHz. So this errs hard toward "runs at all"
// over "looks best" — the ≥20 fps playability floor must hold on the
// worst plausible G3. The Rage-128 box gets its punchier ULTIMATE stack
// from the yosemite overlay; everything else stays safe here.
//
// Resolution + vsync deliberately NOT set (engine default; bench.sh owns
// those via +set under -noarchautoexec).

// Texture & VRAM ----------------------------------------------------
set gl_picmip 1                          // halve texel detail — protects 8/16 MB VRAM G3s
set gl_skymip 1                          // lower-detail sky
set gl_round_down 1                      // round texture sizes DOWN (smaller, safer on tiny VRAM)
set gl_retexturing 0                     // no HD pack; TGA decode too costly on a slow G3
set gl_ext_palettedtexture 1             // 8-bit paletted textures halve VRAM where supported
set gl_texturemode GL_LINEAR_MIPMAP_NEAREST  // bilinear — cheaper than trilinear
set gl_anisotropic 0                     // off — unknown G3 GPU may not support EXT_texture_filter_anisotropic

// Dynamic lights ---------------------------------------------------
// Per-frame R_BuildLightMap is genuinely heavy on a G3; flashblend's
// additive billboards risk the GL_ONE/GL_ONE blend bug seen on the
// Panther Rage-128 driver, so both off in the generic case.
set gl_dynamic 0
set gl_flashblend 0

// Shadows / advanced surfaces --------------------------------------
set gl_shadows 0                         // off — alias alpha pass is fillrate we can't assume
set gl_stencilshadow 0
set gl_glows 0                           // sphere-map texgen not assumable on old G3 GPUs
set gl_trans_lighting 0
set gl_caustics 0
set gl_bloom 0

// Particles --------------------------------------------------------
set gl_ext_pointparameters 0             // buggy on the Rage-128-class drivers; off
set gl_particle_square 1                 // GL_POINTS path — 1 vert/particle, much cheaper

// Frame submission -------------------------------------------------
set gl_finish 0
set gl_clear 0
set gl_ztrick 0
set gl_zfix 1                            // polygon-offset coplanar surfs — near-free, kills z-fighting
set gl_polyblend 1
set gl_lerpmodels 1

// View / cosmetic --------------------------------------------------
set gl_modulate 1.5                      // lift fixed-function gloom
set gl_overbrightbits 2                  // engine default (no multitex combiner assumed)
set intensity 1
set gl_minlight 16                       // lift the lightmap floor so shadowed geometry stays visible (gl_dynamic 0)
set r_2D_unfiltered 1                    // crisp HUD pics regardless of gl_texturemode
set horplus 1

// Fog --------------------------------------------------------------
set gl_fog 0                             // off — fixed-function GL_FOG cost/support varies on old G3 GPUs

// Waterwarp — pure CPU sin() per frame, only underwater. Cheap; keep.
set gl_waterwarp 1

// Lightmap subrect upload — silent no-op with gl_dynamic 0.
set gl_lightmap_subrect 1

// Group-draw — OFF generically. The legacy immediate-mode fast path is
// safest across the oldest ATI/3dfx G3 drivers.
set gl_groupdraw 0

// World decals — small cap; each decal is a fillrate-heavy alpha blend.
set gl_decals 1
set gl_decal_max 8
set gl_decal_life 15
set gl_decal_fade 3

// Client / sound ---------------------------------------------------
set cl_maxfps 60
set cl_gun 1
set s_khz 22                             // 22.05 kHz mix saves audio CPU on a slow G3

// MSAA (CVAR_LATCH) — off; tanks fillrate on any fixed-function G3 GPU.
set gl_msaa_samples 0
