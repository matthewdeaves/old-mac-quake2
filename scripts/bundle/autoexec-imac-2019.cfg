// yquake2 5.11 — per-machine autoexec for imac-2019
//   iMac19,1 (2019) — i5-9600K @ 3.7 GHz, AMD Radeon Pro 580X 8 GB, 15.7 Sequoia
//   Fat binary slice: x86_64 (same slice as mini-intel, vastly different hardware)
//
// Design rationale
// ----------------
// Fastest box in the fleet by a wide margin. The Radeon Pro 580X has
// 8 GB of GDDR5, full GL 4.6 support, and runs Quake 2's fixed-function
// path so far inside its envelope that the limiting factor is the
// engine's own draw-call submission rate. The i5-9600K (6 cores,
// 3.7 GHz base) is several CPU generations beyond anything yquake2
// was designed for — pure overkill.
//
// Strategy: max every visual knob the 5.11 fixed-function path exposes.
// The only thing we can't do here is enable Phase C features
// (bloom / stencil shadows / fog) — those require engine work, not
// just cvar flips. Once Phase B/C cherry-picks land, this is the file
// that gets the most new lines.

// Texture & VRAM ----------------------------------------------------
gl_picmip 0                          // full texel detail (8 GB VRAM laughs at 256x256 textures)
gl_skymip 0                          // full-detail sky
gl_round_down 0                      // round textures UP
gl_retexturing 1                     // hi-res TGA/JPG/PNG textures ON
gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear
gl_anisotropic 16                    // max AF — 580X eats it for breakfast

// Dynamic lights ---------------------------------------------------
gl_dynamic 1                         // full dlights
gl_flashblend 0                      // real lightmap reblend looks better

// Shadows ----------------------------------------------------------
gl_shadows 1                         // alias drop shadows
gl_stencilshadow 0                   // Phase C — engine doesn't expose this on the 5.11 path yet

// Particles --------------------------------------------------------
gl_ext_pointparameters 1             // point sprites
gl_ext_multitexture 1                // mtex
gl_ext_mtexcombine 1                 // combiners
gl_particle_min_size 2               // engine default — chip has fillrate for any size
gl_particle_max_size 40
gl_particle_size 40

// Frame submission -------------------------------------------------
gl_finish 0
gl_clear 0
gl_ztrick 0
gl_polyblend 1

// View / cosmetic --------------------------------------------------
gl_modulate 1                        // engine default — modern driver hits proper brightness
gl_overbrightbits 2                  // engine default
intensity 2                          // engine default
vid_gamma 1.0
horplus 1                            // hor+ fov scaling — looks right on the 5K iMac panel

// Client tier ------------------------------------------------------
cl_maxfps 144                        // raised above engine default — modern panels do 60-144 Hz
cl_gun 2                             // full weapon lerp
cl_particles 1
cl_lights 1
cl_blend 1
cl_entities 1

// Sound ------------------------------------------------------------
s_khz 44                             // full-rate 44 kHz mix
