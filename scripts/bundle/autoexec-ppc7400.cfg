// yquake2 5.11 — GENERIC per-arch baseline for the ppc7400 (G4) slice
//   Applies to ANY PowerPC G4 (AltiVec) Mac that isn't one of the hand-
//   tuned fleet boxes (sawtooth / quicksilver / mini-g4).
//
// Two-layer config model (yquake2/src/common/misc.c):
//   Layer 1 — THIS file. dyld runs the ppc7400 fat slice on any G4
//             (the -mcpu=7400 build stamps cpusubtype ppc7400, and the
//             7450/7447A are binary-compatible descendants), so this is
//             what loads on a generic G4.
//   Layer 2 — a per-machine overlay layered on top at runtime for the
//             three known G4 boxes; unknown G4s keep just this baseline.
//
// Design: seeded from the PROVEN conservative G4 tune (autoexec-sawtooth,
// the 500 MHz 7400 + GeForce2 MX — our slowest, most GPU-limited G4).
// A generic G4 could be a 350 MHz "Yikes!" with a Rage 128, so we trim
// CPU work (dynamic lightmap rebuild, retexturing) and assume only a
// single-TMU fixed-function GPU (no multitex-combiner features). The
// AltiVec code paths (R_LerpVerts etc.) apply since every G4 has AltiVec.

// Texture & VRAM ----------------------------------------------------
set gl_picmip 0                          // full texel detail — G4 + ≥32 MB VRAM has room
set gl_skymip 0
set gl_round_down 0
set gl_retexturing 0                     // no HD pack; TGA decode cost on a slow G4 not worth it generically
set gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear — cheap at the sampler on a G4-era GPU
set gl_anisotropic 2                     // 2x AF — the GeForce2-MX-class minimum; higher is driver-clamped

// Dynamic lights ---------------------------------------------------
// CPU-bound: per-frame R_BuildLightMap + R_AddDynamicLights is the
// limiter on a slow G4, not the GPU (see MISTAKES.md / sawtooth notes).
// Flashblend gives a cheap "light is here" billboard instead.
set gl_dynamic 0
set gl_flashblend 1

// Shadows / advanced surfaces --------------------------------------
set gl_shadows 1                         // alias drop shadows — cheap depth cue
set gl_stencilshadow 0
set gl_glows 0                           // multitex/texgen not assumable on a generic single-TMU G4 GPU
set gl_trans_lighting 0
set gl_caustics 0
set gl_bloom 0

// Particles --------------------------------------------------------
set gl_ext_pointparameters 1             // widely supported on G4-era GPUs
set gl_particle_min_size 1
set gl_particle_max_size 32

// Frame submission -------------------------------------------------
set gl_finish 0                          // CPU stall — bad on a slow G4
set gl_clear 0
set gl_ztrick 0
set gl_zfix 1
set gl_polyblend 1
set gl_lerpmodels 1                      // CPU-cheap on G4 SIMD

// View / cosmetic --------------------------------------------------
set gl_modulate 1.4                      // lift fixed-function gloom
set gl_overbrightbits 2                  // engine default (no combiner assumed)
set intensity 2
set gl_minlight 8                        // gentle lightmap floor (gl_dynamic 0)
set r_2D_unfiltered 1
set horplus 1

// Fog --------------------------------------------------------------
// Fixed-function GL_FOG is essentially free and broadly supported on
// G4-era GPUs. Linear mode for predictability.
set gl_fog 1
set gl_fog_mode 0
set gl_fog_start 64
set gl_fog_end 2048
set gl_fog_red 0.5
set gl_fog_green 0.5
set gl_fog_blue 0.55

// Waterwarp — cheap CPU effect, keep on.
set gl_waterwarp 1

// Lightmap subrect upload — silent no-op with gl_dynamic 0.
set gl_lightmap_subrect 1

// Group-draw — ON. G4-era ATI/NVIDIA Tiger drivers handle vertex-array
// dispatch at least as well as immediate mode.
set gl_groupdraw 1

// World decals -----------------------------------------------------
set gl_decals 1
set gl_decal_max 16
set gl_decal_life 20
set gl_decal_fade 3

// Client / sound ---------------------------------------------------
set cl_maxfps 60                         // a slow G4 can't sustain more; cap to leave CPU room
set cl_gun 1
set s_khz 22

// MSAA (CVAR_LATCH) — off on fixed-function G4 GPUs.
set gl_msaa_samples 0
