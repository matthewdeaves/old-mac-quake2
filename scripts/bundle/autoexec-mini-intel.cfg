// yquake2 5.11 — per-machine autoexec for mini-intel
//   Macmini2,1 (2007) — Core 2 Duo @ 2.33 GHz, Intel GMA 950 64 MB, 10.7.5 Lion
//   Fat binary slice: x86_64
//
// Design rationale
// ----------------
// First x86 box in the fleet, but the Intel GMA 950 is in many respects
// WEAKER than the Radeon 9000 Pro: it's an integrated chip with 64 MB
// VRAM carved from system RAM, no hardware T&L, and a notoriously slow
// fixed-function path on macOS (Apple's Intel GMA driver is one of the
// least-loved OpenGL drivers Apple ever shipped). Baseline (vanilla 5.11):
// demo1 640 = 59 fps (Quartz vsync-capped at 60), 1024 = 116 fps — the
// 1024 figure beats 640 because 640x480 hits a native mode that gates
// on vsync, while 1024 drops into a non-vsynced SDL path.
//
// Strategy: the Core 2 Duo CPU is fast (way faster than any G4), so
// CPU-side work is essentially free. GPU-side we treat the GMA 950
// like a slightly-better Radeon 9200 — keep retexturing, keep dlights
// + shadows, but stay off ANY ARB shader path (GMA 950 doesn't have
// fragment_program). 4x AF is the GMA's sweet spot.

// Texture & VRAM ----------------------------------------------------
set gl_picmip 0                          // full texel detail
set gl_skymip 0                          // full-detail sky
set gl_round_down 0                      // round textures UP — Core 2 Duo can decode quickly, GMA can sample
set gl_retexturing 1                     // hi-res textures ON
set gl_texturemode GL_LINEAR_MIPMAP_LINEAR   // trilinear filtering
set gl_anisotropic 8                     // GMA 950 cap is 8x per Apple's OpenGL caps — Phase-C-unlock 2026-05-19

// Dynamic lights ---------------------------------------------------
set gl_dynamic 1                         // full dlights — Core 2 Duo + GMA handle it
set gl_flashblend 0                      // prefer real lightmap reblend

// Shadows ----------------------------------------------------------
set gl_shadows 1                         // alias drop shadows ON
set gl_stencilshadow 0                   // GMA 950 stencil path likely slow per the R9000/R9200 result; leave off until benched on actual mini-intel

// Particles --------------------------------------------------------
set gl_ext_pointparameters 1             // GMA 950 point sprites work
set gl_ext_multitexture 1                // mtex
set gl_ext_mtexcombine 1                 // combiners

// Frame submission -------------------------------------------------
set gl_finish 0                          // Apple's GMA driver stalls badly on glFinish — never enable
set gl_clear 0
set gl_ztrick 0
set gl_zfix 1                            // polygon-offset coplanar surfs — kills decal/brush z-fighting (near-free)
set gl_polyblend 1

// View / cosmetic --------------------------------------------------
set gl_modulate 1                        // engine default
// 2026-05-19: GL_RGB_SCALE_EXT 4 in the multitex combiner — Q3-style
// punchy lightmaps. GMA 950 supports GL_ARB_texture_env_combine and
// the 4x RGB scale at sampler stage; cost is identical to 2x (it's
// just a combiner mode flag, not an extra pass). Modern GPU envelope.
set gl_overbrightbits 4                  // Q3-style punchy lightmaps
set intensity 2                          // engine default
set vid_gamma 1.0
set horplus 1
// gl_farsee — extends the far clip plane (sky doubled to 4096). Pure
// draw-distance correctness on large maps (never looks worse, only draws
// MORE distant geometry). fps-free on the Core 2 Duo: A/B 2026-05-29
// demo1 1024 = 100.65 vs 100.80 baseline. CVAR_LATCH (same as gl_msaa).
set gl_farsee 1

// Fog (Phase C, cvar-driven GL_FOG) --------------------------------
// GMA 950's fixed-function GL_FOG goes through hw — Apple's driver
// handles it. Linear mode for stability across the GMA fragment pipe.
set gl_fog 1
set gl_fog_mode 0
set gl_fog_start 64
set gl_fog_end 2048
set gl_fog_red 0.5
set gl_fog_green 0.5
set gl_fog_blue 0.55

// Waterwarp (Phase C #2) — underwater sin-warp via projection matrix
set gl_waterwarp 1

// Lightmap subrect upload (Phase B #1) — upload only dirty columns
// of the dynamic lightmap atlas each frame. gl_dynamic 0 machines
// (yosemite, sawtooth) execute no dynamic upload anyway, so this is
// a silent no-op on them. ON by default.
set gl_lightmap_subrect 1

// Group-draw (Phase B #3) — ON, but fps-NEUTRAL (not the +17% once claimed).
// The original "102→119 (+17%)" measurement (commit b9588bc, 2026-05-20)
// predates the texenv fix (78c26f2): that 119 figure was the BROKEN
// combiner rendering overbright lightmap-only, which is cheaper — same
// bench-correctness-≠-visual-correctness trap as the reverted AltiVec
// R_LerpVerts (see MISTAKES.md). Post-fix re-bench: gl_groupdraw 1 =
// 101.20 vs gl_groupdraw 0 = 102.05 — within noise. Kept ON for the
// batched-dispatch code-path (correct, harmless); it is not a win here.
set gl_groupdraw 1                       // fps-neutral post-texenv-fix; kept for code-path parity

// Client tier ------------------------------------------------------
set cl_maxfps 95                         // engine default — Core 2 Duo has full CPU budget
set cl_gun 2                             // full weapon lerp
set cl_particles 1
set cl_lights 1
set cl_blend 1
set cl_entities 1

// Sound ------------------------------------------------------------
set s_khz 44                             // full-rate 44 kHz mix

// Tier 2 — HUD pics on GL_NEAREST regardless of gl_texturemode
set r_2D_unfiltered 1

// World decals (KMQuake2 r_fragment.c port) ------------------------
// Bullet/blood/scorch marks on walls.
set gl_decals 1
set gl_decal_max 64
set gl_decal_life 20                     // sec before fade starts
set gl_decal_fade 3                      // sec to fade fully out

// MSAA (CVAR_LATCH — requires vid_restart to switch) ----------------
// GMA 950 — 2x supported, light fillrate cost
set gl_msaa_samples 2

// Textured point sprite particles (GL_ARB_point_sprite) ------------
// Glow textured particles instead of solid squares — needs R9000+/GMA950+.
set gl_pointsprites 1
